name: CI/CD Build

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate short SHA
        id: set-short-sha
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew assembleStandardRelease

      - name: Sign APKs
        run: |
          set -e
          STANDARD_RELEASE_DIR="app/build/outputs/apk/standard/release"
          
          if [ -z "${{ secrets.SIGNING_KEYSTORE }}" ]; then
            echo "SIGNING_KEYSTORE secret is not available. Skipping signing step."
            exit 0
          fi
          
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > release.keystore
          
          find "$STANDARD_RELEASE_DIR" -name "app-standard-*-release-unsigned.apk" -type f | while read -r apk; do
            signed_apk="${apk/-unsigned/}"
          
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
              --ks release.keystore \
              --ks-key-alias "${{ secrets.SIGNING_KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.SIGNING_STORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              --out "$signed_apk" \
              "$apk"
          
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify "$signed_apk"
            rm "$apk"
          done
          
          rm release.keystore
          echo "APKs signed and verified successfully."

      - name: Rename APKs
        run: |
          cd app/build/outputs/apk/standard/release/
          for file in app-standard-*.apk; do
            mv "$file" "${file/app-standard-/mpvrx-}"
          done

      - name: Upload arm64-v8a Artifact
        uses: actions/upload-artifact@v7
        with:
          name: mpvrx-arm64-v8a-release-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/standard/release/mpvrx-arm64-v8a-release*.apk
          if-no-files-found: warn
          archive: false

      - name: Upload armeabi-v7a Artifact
        uses: actions/upload-artifact@v7
        with:
          name: mpvrx-armeabi-v7a-release-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/standard/release/mpvrx-armeabi-v7a-release*.apk
          if-no-files-found: warn
          archive: false

      - name: Upload universal Artifact
        uses: actions/upload-artifact@v7
        with:
          name: mpvrx-universal-release-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/standard/release/mpvrx-universal-release*.apk
          if-no-files-found: warn
          archive: false

      - name: Upload x86 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: mpvrx-x86-release-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/standard/release/mpvrx-x86-release*.apk
          if-no-files-found: warn
          archive: false

      - name: Upload x86_64 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: mpvrx-x86_64-release-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/standard/release/mpvrx-x86_64-release*.apk
          if-no-files-found: warn
          archive: false

